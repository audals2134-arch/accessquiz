<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAG 접근성 퀴즈</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #222633;
            --border: #2a2e3d;
            --text: #e2e4eb;
            --text-dim: #8b8fa3;
            --accent: #6c9cff;
            --accent-glow: rgba(108, 156, 255, 0.15);
            --correct: #4ade80;
            --correct-glow: rgba(74, 222, 128, 0.12);
            --incorrect: #f87171;
            --incorrect-glow: rgba(248, 113, 113, 0.12);
            --fever: #f59e0b;
            --fever-glow: rgba(245, 158, 11, 0.2);
            --super-fever: #f43f5e;
            --super-fever-glow: rgba(244, 63, 94, 0.25);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            width: 100%;
            max-width: 680px;
            position: relative;
            z-index: 1;
        }

        /* --- Title Screen --- */
        .title-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            text-align: center;
        }

        .title-icon {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(108, 156, 255, 0.25);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .title-icon svg {
            width: 44px;
            height: 44px;
            fill: white;
        }

        .title-screen h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .title-screen h1 span {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-screen .title-sub {
            font-size: 15px;
            color: var(--text-dim);
            font-weight: 300;
            margin-bottom: 48px;
            line-height: 1.6;
        }

        .title-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 48px;
        }

        .title-stat {
            text-align: center;
        }

        .title-stat .stat-num {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .title-stat .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .title-start-btn {
            padding: 16px 64px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            color: var(--bg);
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(108, 156, 255, 0.3);
        }

        .title-start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(108, 156, 255, 0.4);
        }

        .title-version {
            margin-top: 48px;
            font-size: 11px;
            color: var(--border);
        }

        /* --- Start Screen (Pool Select) --- */
        .start-screen {
            display: none;
            text-align: center;
            padding-top: 40px;
        }

        .start-screen h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .start-screen .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 36px;
        }

        .start-screen .back-link {
            display: inline-block;
            margin-bottom: 28px;
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
        }

        .start-screen .back-link:hover {
            color: var(--accent);
        }

        .pool-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .pool-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: rgba(26, 29, 39, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
        }

        .pool-btn:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(108, 156, 255, 0.15);
        }

        .pool-btn:active {
            transform: scale(0.98);
        }

        .pool-btn .count {
            color: var(--text-dim);
            font-size: 13px;
        }

        /* --- Quiz Screen --- */
        .quiz-screen { display: none; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .top-bar .pool-label {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
        }

        .top-bar .progress-text {
            font-size: 13px;
            color: var(--text-dim);
        }

        .home-btn {
            padding: 5px 14px;
            font-size: 12px;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .home-btn:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--surface);
            border-radius: 2px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a78bfa);
            border-radius: 2px;
            transition: width 0.4s ease;
            box-shadow: 0 0 8px rgba(108, 156, 255, 0.4);
        }

        .question-card {
            background: rgba(26, 29, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 32px 28px;
            margin-bottom: 24px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .question-card:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .question-card.slide-in {
            animation: slideIn 0.35s ease;
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(30px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .question-number {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.7;
            word-break: keep-all;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 20px;
            background: rgba(26, 29, 39, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.6;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            word-break: keep-all;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: var(--accent-glow);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .option-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .option-btn:disabled { cursor: default; }

        .option-label {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .option-btn.correct {
            border-color: var(--correct);
            background: var(--correct-glow);
        }

        .option-btn.correct .option-label {
            background: var(--correct);
            color: var(--bg);
        }

        .option-btn.incorrect {
            border-color: var(--incorrect);
            background: var(--incorrect-glow);
        }

        .option-btn.incorrect .option-label {
            background: var(--incorrect);
            color: var(--bg);
        }

        .option-btn.dimmed {
            opacity: 0.4;
        }

        .option-btn.correct {
            animation: correctPulse 0.5s ease;
        }

        .option-btn.incorrect {
            animation: shake 0.4s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Screen flash effects */
        .quiz-flash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
        }

        .quiz-flash.correct-flash {
            background: radial-gradient(ellipse at center, rgba(74, 222, 128, 0.15) 0%, transparent 70%);
            animation: flashIn 0.5s ease forwards;
        }

        .quiz-flash.incorrect-flash {
            background: radial-gradient(ellipse at center, rgba(248, 113, 113, 0.15) 0%, transparent 70%);
            animation: flashIn 0.5s ease forwards;
        }

        @keyframes flashIn {
            0% { opacity: 0; }
            30% { opacity: 1; }
            100% { opacity: 0; }
        }

        .explanation {
            display: none;
            background: rgba(108, 156, 255, 0.08);
            border: 1px solid rgba(108, 156, 255, 0.2);
            border-radius: 10px;
            padding: 18px 22px;
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-dim);
        }

        .explanation.visible { display: block; }

        .explanation .exp-title {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            font-size: 13px;
        }

        .next-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            display: none;
        }

        .next-btn:hover { opacity: 0.85; }
        .next-btn.visible { display: block; }

        /* --- OX Quiz --- */
        .ox-btn {
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .ox-label {
            width: 40px !important;
            height: 40px !important;
            font-size: 20px !important;
            font-weight: 900 !important;
        }

        /* --- Short Answer --- */
        .short-answer-wrapper {
            display: flex;
            gap: 10px;
        }

        .short-answer-input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(26, 29, 39, 0.7);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .short-answer-input:focus {
            border-color: var(--accent);
        }

        .short-answer-input.correct {
            border-color: var(--correct);
            background: var(--correct-glow);
        }

        .short-answer-input.incorrect {
            border-color: var(--incorrect);
            background: var(--incorrect-glow);
        }

        .short-answer-input:disabled {
            opacity: 0.8;
        }

        .short-answer-submit {
            padding: 14px 24px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .short-answer-submit:hover { opacity: 0.85; }
        .short-answer-submit:disabled { opacity: 0.5; cursor: default; }

        .short-answer-correct {
            margin-top: 10px;
            padding: 10px 16px;
            background: var(--correct-glow);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 8px;
            color: var(--correct);
            font-size: 14px;
            font-weight: 600;
        }

        /* --- Fever System --- */
        .fever-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding: 8px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.3s;
            opacity: 0;
            transform: translateY(-8px);
        }

        .fever-bar.active {
            opacity: 1;
            transform: translateY(0);
        }

        .fever-bar.fever {
            border-color: var(--fever);
            background: var(--fever-glow);
        }

        .fever-bar.super-fever {
            border-color: var(--super-fever);
            background: var(--super-fever-glow);
        }

        .fever-label {
            font-weight: 700;
            white-space: nowrap;
        }

        .fever-bar.fever .fever-label {
            color: var(--fever);
        }

        .fever-bar.super-fever .fever-label {
            color: var(--super-fever);
        }

        .fever-gauge {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .fever-gauge-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .fever-bar.fever .fever-gauge-fill {
            background: var(--fever);
        }

        .fever-bar.super-fever .fever-gauge-fill {
            background: var(--super-fever);
        }

        .fever-multiplier {
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
        }

        .fever-bar.fever .fever-multiplier {
            color: var(--fever);
        }

        .fever-bar.super-fever .fever-multiplier {
            color: var(--super-fever);
        }

        .fever-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 32px;
            font-weight: 900;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            text-shadow: 0 0 20px currentColor;
            transition: none;
        }

        .fever-popup.show {
            animation: feverPopup 1s ease forwards;
        }

        @keyframes feverPopup {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            40% { transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
        }

        .fever-popup.fever { color: var(--fever); }
        .fever-popup.super-fever { color: var(--super-fever); }

        .score-popup {
            position: absolute;
            top: -20px;
            right: 0;
            font-size: 16px;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            animation: scoreFloat 0.8s ease forwards;
        }

        .score-popup.normal { color: var(--correct); }
        .score-popup.fever { color: var(--fever); }
        .score-popup.super-fever { color: var(--super-fever); }

        @keyframes scoreFloat {
            0% { opacity: 0; transform: translateY(0); }
            30% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        .quiz-screen.fever-mode {
            border-top: 2px solid var(--fever);
        }

        .quiz-screen.super-fever-mode {
            border-top: 2px solid var(--super-fever);
        }

        /* Fever background pulse */
        .quiz-screen.fever-mode::before,
        .quiz-screen.super-fever-mode::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            animation: feverPulse 1.5s ease-in-out infinite;
        }

        .quiz-screen.fever-mode::before {
            background: radial-gradient(ellipse at center, rgba(245, 158, 11, 0.06) 0%, transparent 60%);
        }

        .quiz-screen.super-fever-mode::before {
            background: radial-gradient(ellipse at center, rgba(244, 63, 94, 0.08) 0%, transparent 60%);
        }

        @keyframes feverPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 100;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }

        /* Result screen entrance */
        .result-screen.visible {
            animation: resultEntrance 0.6s ease;
        }

        @keyframes resultEntrance {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .fever-score {
            font-size: 15px;
            color: var(--fever);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .fever-score .bonus {
            color: var(--super-fever);
        }

        /* --- Result Screen --- */
        .result-screen {
            display: none;
            text-align: center;
            padding-top: 60px;
        }

        .result-screen h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
        }

        .score-ring {
            width: 180px;
            height: 180px;
            margin: 0 auto 32px;
            position: relative;
        }

        .score-ring svg {
            transform: rotate(-90deg);
            width: 180px;
            height: 180px;
        }

        .score-ring .bg-circle {
            fill: none;
            stroke: var(--surface);
            stroke-width: 10;
        }

        .score-ring .fg-circle {
            fill: none;
            stroke: var(--accent);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .score-label {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: 700;
        }

        .score-label small {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-dim);
        }

        .result-message {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .result-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .result-actions button {
            padding: 12px 28px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
        }

        .result-actions button:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .result-actions button.primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .result-actions button.primary:hover { opacity: 0.85; }

        .result-actions button.danger {
            background: var(--incorrect);
            color: var(--bg);
            border-color: var(--incorrect);
        }

        .result-actions button.danger:hover { opacity: 0.85; }

        /* --- Section Divider --- */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0 16px;
        }

        .section-divider span {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 500;
            white-space: nowrap;
        }

        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* --- Wrong Note Button --- */
        .pool-btn .wrong-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--incorrect-glow);
            color: var(--incorrect);
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .pool-btn.wrong-note-btn {
            border-color: rgba(248, 113, 113, 0.3);
        }

        .pool-btn.wrong-note-btn:hover {
            border-color: var(--incorrect);
            background: var(--incorrect-glow);
        }

        .clear-wrong-btn {
            padding: 6px 14px;
            font-size: 12px;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .clear-wrong-btn:hover {

<script>
// --- Firebase Init ---
const firebaseConfig = {
    apiKey: "AIzaSyBi5_CfJ4meRh4I6aLlsmrLk4nJeumMMNQ",
    authDomain: "accessquiz-4637b.firebaseapp.com",
    projectId: "accessquiz-4637b",
    storageBucket: "accessquiz-4637b.firebasestorage.app",

};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;

// --- Auth ---
auth.onAuthStateChanged(user => {
    currentUser = user;
    updateAuthUI();
    if (user) {
        loadAndMergeWrongNotes();
    } else {
        // 로그아웃 시 로컬 데이터로 복원
        wrongNotesCache = loadWrongNotesFromLocal();

});

function updateAuthUI() {
    const loginBtn = document.getElementById('loginBtn');
    const userInfo = document.getElementById('userInfo');
    if (currentUser) {
        loginBtn.style.display = 'none';
        userInfo.style.display = 'inline-flex';

        document.getElementById('userName').textContent = currentUser.displayName || '사용자';

function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => {
        console.error('Login error:', err);
        if (err.code === 'auth/popup-blocked') {
            alert('팝업이 차단되었습니다. 브라우저 설정에서 팝업을 허용해주세요.');
        } else if (err.code === 'auth/popup-closed-by-user') {
            // 사용자가 직접 닫은 경우 무시
        } else {
            alert('로그인에 실패했습니다. 다시 시도해주세요.');
        }
    });
}

function googleLogout() {
    auth.signOut();
}

// --- Firestore: Save Score ---
async function saveScoreToFirestore(poolId, mode, scoreVal, total, feverTotalScore) {
    if (!currentUser) return;
    const pct = Math.round((scoreVal / total) * 100);
    try {
        await db.collection('scores').add({
            uid: currentUser.uid,
            nickname: currentUser.displayName || '익명',
            photoURL: currentUser.photoURL || '',
            pool_id: poolId,
            mode: mode,
            score: scoreVal,
            total: total,
            percentage: pct,
            totalScore: feverTotalScore || scoreVal * 10,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    } catch (err) {
        console.error('Score save error:', err);
    }
}

// --- Firestore: Ranking ---
async function loadRanking(poolId) {
    const listEl = document.getElementById('rankingList');
    listEl.innerHTML = '<div class="ranking-empty">불러오는 중...</div>';

    try {
        // Fetch scores and sort client-side (no composite index needed)
        let query;
        if (poolId !== 'all') {
            query = db.collection('scores').where('pool_id', '==', poolId).limit(200);
        } else {
            query = db.collection('scores').limit(200);
        }
        const snapshot = await query.get();

        // Aggregate best score per user (전체풀기만, totalScore 기준)
        const bestByUser = {};
        snapshot.forEach(doc => {
            const d = doc.data();
            if (d.mode && d.mode !== 'all') return; // 랜덤10 제외
            const ts = d.totalScore || d.score * 10; // 이전 데이터 호환
            if (!bestByUser[d.uid] || ts > (bestByUser[d.uid].totalScore || bestByUser[d.uid].score * 10)) {
                bestByUser[d.uid] = { ...d, totalScore: ts };
            }
        });

        const ranked = Object.values(bestByUser).sort((a, b) => b.totalScore - a.totalScore || (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

        if (ranked.length === 0) {
            listEl.innerHTML = '<div class="ranking-empty">아직 기록이 없습니다.<br>퀴즈를 풀고 첫 번째 랭커가 되어보세요!</div>';
            return;
        }

        listEl.innerHTML = '';
        ranked.forEach((r, i) => {
            const item = document.createElement('div');
            item.className = 'ranking-item' + (currentUser && r.uid === currentUser.uid ? ' my-rank' : '');
            const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
            item.innerHTML = `
                <div class="rank-num ${rankClass}">${i + 1}</div>
                <img class="rank-avatar" src="${r.photoURL || ''}" alt="" onerror="this.style.display='none'">
                <div class="rank-info">
                    <div class="rank-name">${r.nickname || '익명'}</div>
                    <div class="rank-detail">${r.score}/${r.total}문항 (${r.percentage}%)</div>
                </div>
                <div class="rank-score">${r.totalScore}<small>점</small></div>
            `;
            listEl.appendChild(item);
        });
    } catch (err) {
        console.error('Ranking load error:', err);
        listEl.innerHTML = `<div class="ranking-empty">랭킹을 불러올 수 없습니다.<br><small style="color:var(--incorrect)">${err.code || ''}: ${err.message || err}</small></div>`;
    }
}

function showRanking(selectedPool) {
    hideAllScreens();
    document.getElementById('rankingScreen').style.display = 'block';

    // Build tabs
    const tabsEl = document.getElementById('rankingTabs');
    const pools = {};
    quizData.questions.forEach(q => { pools[q.pool_id] = true; });
    const poolIds = ['all', ...Object.keys(pools)];
    const activePool = selectedPool || 'all';

    tabsEl.innerHTML = '';
    poolIds.forEach(pid => {
        const tab = document.createElement('button');
        tab.className = 'ranking-tab' + (pid === activePool ? ' active' : '');
        tab.textContent = pid === 'all' ? '전체' : pid;
        tab.onclick = () => showRanking(pid);
        tabsEl.appendChild(tab);
    });

    loadRanking(activePool);
}

let quizData = null;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let totalScore = 0;
let streak = 0;
let feverLevel = 0; // 0: none, 1: fever(x2), 2: super fever(x3)
let answered = false;
let currentPoolId = '';
let currentQuizMode = 'all';
let isWrongNoteMode = false;
let wrongThisSession = [];
let selectedModePoolId = '';

const LABELS = ['A', 'B', 'C', 'D'];
const WRONG_STORAGE_KEY = 'xag_wrong_notes';

// --- Wrong Notes with Firestore Sync ---
let wrongNotesCache = {};
let wrongNotesSyncing = false;

function loadWrongNotesFromLocal() {
    try { return JSON.parse(localStorage.getItem(WRONG_STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveWrongNotesToLocal(notes) {
    localStorage.setItem(WRONG_STORAGE_KEY, JSON.stringify(notes));
}

function getWrongNotes() {
    return wrongNotesCache;
}

function saveWrongNotes(notes) {
    wrongNotesCache = notes;
    saveWrongNotesToLocal(notes);
    syncWrongNotesToFirestore(notes);
}

function addWrongNote(poolId, questionKey) {
    const notes = getWrongNotes();
    if (!notes[poolId]) notes[poolId] = [];
    if (!notes[poolId].includes(questionKey)) notes[poolId].push(questionKey);
    saveWrongNotes(notes);
}

function removeWrongNote(poolId, questionKey) {
    const notes = getWrongNotes();
    if (notes[poolId]) {
        notes[poolId] = notes[poolId].filter(k => k !== questionKey);
        if (notes[poolId].length === 0) delete notes[poolId];
    }
    saveWrongNotes(notes);
}

function clearWrongNotes(poolId) {
    const notes = getWrongNotes();
    if (poolId === 'all') {
        saveWrongNotes({});
    } else {
        delete notes[poolId];
        saveWrongNotes(notes);
    }
}

function getWrongCount(poolId) {
    const notes = getWrongNotes();
    if (poolId === 'all') {
        return Object.values(notes).reduce((sum, arr) => sum + arr.length, 0);
    }
    return (notes[poolId] || []).length;
}

function getWrongQuestions(poolId) {
    const notes = getWrongNotes();
    if (poolId === 'all') {
        const allKeys = new Set(Object.values(notes).flat());
        return quizData.questions.filter(q => allKeys.has(q.key));
    }
    const keys = notes[poolId] || [];
    return quizData.questions.filter(q => keys.includes(q.key));
}

// Firestore 동기화: 저장
async function syncWrongNotesToFirestore(notes) {
    if (!currentUser || wrongNotesSyncing) return;
    try {
        await db.collection('wrongNotes').doc(currentUser.uid).set(notes);
    } catch (err) {
        console.error('Wrong notes sync error:', err);
    }
}

// Firestore 동기화: 로그인 시 서버 데이터 로드
async function loadAndMergeWrongNotes() {
    if (!currentUser) return;
    wrongNotesSyncing = true;
    try {
        const doc = await db.collection('wrongNotes').doc(currentUser.uid).get();
        if (doc.exists) {
            // 서버 데이터가 있으면 서버 우선
            const serverNotes = doc.data();
            wrongNotesCache = serverNotes;
            saveWrongNotesToLocal(serverNotes);
        } else {
            // 첫 로그인: 로컬 데이터를 서버에 업로드
            const localNotes = loadWrongNotesFromLocal();
            wrongNotesCache = localNotes;
            await db.collection('wrongNotes').doc(currentUser.uid).set(localNotes);
        }
        wrongNotesSyncing = false;
        buildTitleStats();
    } catch (err) {
        console.error('Wrong notes load error:', err);
        wrongNotesSyncing = false;
    }
}

function updateFeverUI() {
    const bar = document.getElementById('feverBar');
    const label = document.getElementById('feverLabel');
    const fill = document.getElementById('feverGaugeFill');
    const mult = document.getElementById('feverMultiplier');
    const quizScreen = document.getElementById('quizScreen');

    // Remove previous classes
    bar.classList.remove('fever', 'super-fever', 'active');
    quizScreen.classList.remove('fever-mode', 'super-fever-mode');

    if (feverLevel === 0) {
        // 게이지만 표시 (3연속까지의 진행도)
        if (streak > 0) {
            bar.classList.add('active', 'fever');
            label.textContent = 'FEVER';
            mult.textContent = `${streak}/3`;
            fill.style.width = `${(streak / 3) * 100}%`;
        }
    } else if (feverLevel === 1) {
        bar.classList.add('active', 'fever');
        quizScreen.classList.add('fever-mode');
        label.textContent = 'FEVER';
        mult.textContent = 'x2';
        fill.style.width = `${((streak - 3) / 3) * 100}%`;
    } else if (feverLevel === 2) {
        bar.classList.add('active', 'super-fever');
        quizScreen.classList.add('super-fever-mode');
        label.textContent = 'SUPER FEVER';
        mult.textContent = 'x3';
        fill.style.width = '100%';
    }
}

function showFeverPopup(level) {
    const popup = document.createElement('div');
    popup.className = `fever-popup ${level === 2 ? 'super-fever' : 'fever'}`;
    popup.textContent = level === 2 ? 'SUPER FEVER! x3' : 'FEVER! x2';
    document.body.appendChild(popup);
    requestAnimationFrame(() => popup.classList.add('show'));
    setTimeout(() => popup.remove(), 1000);
}

function showScorePopup(points, level) {
    const card = document.querySelector('.question-card');
    const popup = document.createElement('div');
    popup.className = `score-popup ${level === 2 ? 'super-fever' : level === 1 ? 'fever' : 'normal'}`;
    popup.textContent = `+${points}`;
    card.appendChild(popup);
    setTimeout(() => popup.remove(), 800);
}

function hideAllScreens() {
    document.getElementById('titleScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('modeScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('rankingScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
}

function showTitle() {
    hideAllScreens();
    document.getElementById('titleScreen').style.display = '';
    buildTitleStats();
}

function showPoolSelect() {
    hideAllScreens();
    document.getElementById('startScreen').style.display = 'block';
    buildStartScreen();
}

function goHome() {
    showPoolSelect();
}

function showModeSelect(poolId) {
    selectedModePoolId = poolId;
    const filtered = poolId === 'all'
        ? quizData.questions
        : quizData.questions.filter(q => q.pool_id === poolId);
    const total = filtered.length;

    hideAllScreens();
    document.getElementById('modeScreen').style.display = 'block';
    document.getElementById('modePoolTitle').textContent = poolId === 'all' ? '전체 문제' : poolId;
    document.getElementById('modeSubtitle').textContent = `총 ${total}문항`;
    document.getElementById('allModeBtnDesc').textContent = `${total}문항 전체 풀기`;

    const randomBtn = document.getElementById('randomModeBtn');
    if (total <= 10) {
        randomBtn.style.display = 'none';
    } else {
        randomBtn.style.display = '';
    }
}

function startModeQuiz(mode) {
    currentQuizMode = mode;
    if (mode === 'random') {
        startQuiz(selectedModePoolId, false, 10);
    } else {
        startQuiz(selectedModePoolId, false, null);
    }
}

function buildTitleStats() {
    const pools = {};
    quizData.questions.forEach(q => {
        if (!pools[q.pool_id]) pools[q.pool_id] = 0;
        pools[q.pool_id]++;
    });

    const statsEl = document.getElementById('titleStats');
    statsEl.innerHTML = `
        <div class="title-stat"><div class="stat-num">${quizData.questions.length}</div><div class="stat-label">전체 문항</div></div>
        <div class="title-stat"><div class="stat-num">${Object.keys(pools).length}</div><div class="stat-label">섹션</div></div>
        <div class="title-stat"><div class="stat-num">${getWrongCount('all')}</div><div class="stat-label">오답노트</div></div>
    `;

    const versionEl = document.getElementById('titleVersion');
    if (quizData.meta && quizData.meta.version) {
        versionEl.textContent = `v${quizData.meta.version}`;
    }
}

// Load quiz data from global variable (XAG_Quiz_RawData.js)
quizData = QUIZ_DATA;
wrongNotesCache = loadWrongNotesFromLocal();
buildTitleStats();

function buildStartScreen() {
    const pools = {};
    quizData.questions.forEach(q => {
        if (!pools[q.pool_id]) pools[q.pool_id] = 0;
        pools[q.pool_id]++;
    });

    const container = document.getElementById('poolSelect');
    container.innerHTML = '';

    // All questions button
    const allBtn = document.createElement('button');
    allBtn.className = 'pool-btn';
    allBtn.innerHTML = `<span>전체 문제</span><span class="count">${quizData.questions.length}문항</span>`;
    allBtn.onclick = () => showModeSelect('all');
    container.appendChild(allBtn);

    // Per-pool buttons
    for (const [poolId, count] of Object.entries(pools)) {
        const btn = document.createElement('button');
        btn.className = 'pool-btn';
        btn.innerHTML = `<span>${poolId}</span><span class="count">${count}문항</span>`;
        btn.onclick = () => showModeSelect(poolId);
        container.appendChild(btn);
    }

    // Wrong notes section
    const totalWrong = getWrongCount('all');
    if (totalWrong > 0) {
        const divider = document.createElement('div');
        divider.className = 'section-divider';
        divider.innerHTML = '<span>오답노트</span>';
        container.appendChild(divider);

        // All wrong button
        const allWrongBtn = document.createElement('button');
        allWrongBtn.className = 'pool-btn wrong-note-btn';
        allWrongBtn.innerHTML = `<span>전체 오답 <span class="wrong-badge">${totalWrong}문항</span></span><span class="count">다시 풀기</span>`;
        allWrongBtn.onclick = () => startQuiz('all', true);
        container.appendChild(allWrongBtn);

        // Per-pool wrong buttons
        for (const poolId of Object.keys(pools)) {
            const wrongCount = getWrongCount(poolId);
            if (wrongCount > 0) {
                const wrapDiv = document.createElement('div');
                wrapDiv.style.cssText = 'display:flex;gap:8px;align-items:stretch;';

                const btn = document.createElement('button');
                btn.className = 'pool-btn wrong-note-btn';
                btn.style.flex = '1';
                btn.innerHTML = `<span>${poolId} 오답 <span class="wrong-badge">${wrongCount}문항</span></span><span class="count">다시 풀기</span>`;
                btn.onclick = () => startQuiz(poolId, true);

                const clearBtn = document.createElement('button');
                clearBtn.className = 'clear-wrong-btn';
                clearBtn.textContent = '초기화';
                clearBtn.onclick = (e) => {
                    e.stopPropagation();
                    clearWrongNotes(poolId);
                    buildStartScreen();
                };

                wrapDiv.appendChild(btn);
                wrapDiv.appendChild(clearBtn);
                container.appendChild(wrapDiv);
            }
        }
    }
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startQuiz(poolId, wrongNoteMode, randomCount) {
    currentPoolId = poolId;
    isWrongNoteMode = wrongNoteMode;
    wrongThisSession = [];

    let filtered;
    if (wrongNoteMode) {
        filtered = getWrongQuestions(poolId);
    } else {
        filtered = poolId === 'all'
            ? quizData.questions
            : quizData.questions.filter(q => q.pool_id === poolId);
    }

    if (filtered.length === 0) {
        alert('풀 문제가 없습니다.');
        return;
    }

    const shuffled = shuffle(filtered);
    currentQuestions = (randomCount && randomCount < shuffled.length)
        ? shuffled.slice(0, randomCount)
        : shuffled;
    currentIndex = 0;
    score = 0;
    totalScore = 0;
    streak = 0;
    feverLevel = 0;

    hideAllScreens();
    document.getElementById('quizScreen').style.display = 'block';
    updateFeverUI();

    let label;
    if (wrongNoteMode) {
        label = poolId === 'all' ? '전체 오답노트' : `${poolId} 오답노트`;
    } else if (randomCount && randomCount < filtered.length) {
        label = poolId === 'all' ? `전체 · 랜덤 ${randomCount}문제` : `${poolId} · 랜덤 ${randomCount}문제`;
    } else {
        label = poolId === 'all' ? '전체 문제' : poolId;
    }
    document.getElementById('poolLabel').textContent = label;

    loadQuestion();
}

function loadQuestion() {
    answered = false;
    const q = currentQuestions[currentIndex];
    const total = currentQuestions.length;

    document.getElementById('questionNumber').textContent = `Q${currentIndex + 1}`;
    document.getElementById('questionText').textContent = q.question;
    document.getElementById('progressText').textContent = `${currentIndex + 1} / ${total}`;
    document.getElementById('progressFill').style.width = `${((currentIndex) / total) * 100}%`;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';

    const type = q.question_type || 'multiple_choice';

    if (type === 'ox') {
        loadOXQuestion(container, q);
    } else if (type === 'short_answer') {
        loadShortAnswerQuestion(container, q);
    } else {
        loadMultipleChoiceQuestion(container, q);
    }

    document.getElementById('explanation').classList.remove('visible');
    document.getElementById('nextBtn').classList.remove('visible');

    // Slide-in animation
    const card = document.querySelector('.question-card');
    card.classList.remove('slide-in');
    void card.offsetWidth;
    card.classList.add('slide-in');
}

function loadMultipleChoiceQuestion(container, q) {
    const correctText = q.options[q.answer_index - 1];
    const shuffledOptions = shuffle(q.options);

    shuffledOptions.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-label">${LABELS[i]}</span><span>${opt}</span>`;
        btn.onclick = () => selectOption(btn, opt, correctText, q);
        container.appendChild(btn);
    });
}

function loadOXQuestion(container, q) {
    const correctAnswer = q.answer ? 'O' : 'X';
    ['O', 'X'].forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'option-btn ox-btn';
        btn.innerHTML = `<span class="option-label ox-label">${choice}</span><span>${choice === 'O' ? '맞다' : '틀리다'}</span>`;
        btn.onclick = () => selectOption(btn, choice, correctAnswer, q);
        container.appendChild(btn);
    });
}

function loadShortAnswerQuestion(container, q) {
    const wrapper = document.createElement('div');
    wrapper.className = 'short-answer-wrapper';
    wrapper.innerHTML = `
        <input type="text" class="short-answer-input" id="shortAnswerInput" placeholder="정답을 입력하세요" autocomplete="off">
        <button class="short-answer-submit" id="shortAnswerSubmit">제출</button>
    `;
    container.appendChild(wrapper);

    const input = wrapper.querySelector('#shortAnswerInput');
    const submitBtn = wrapper.querySelector('#shortAnswerSubmit');

    const handleSubmit = () => {
        if (answered) return;
        const userAnswer = input.value.trim();
        if (!userAnswer) return;
        checkShortAnswer(userAnswer, q, input, submitBtn);
    };

    submitBtn.onclick = handleSubmit;
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSubmit();
    });
    setTimeout(() => input.focus(), 100);
}

function checkShortAnswer(userAnswer, question, input, submitBtn) {
    if (answered) return;
    answered = true;

    const accepted = question.accepted_answers || [question.answer_text];
    const normalize = s => s.toLowerCase().replace(/\s+/g, '').trim();
    const isCorrect = accepted.some(a => normalize(a) === normalize(userAnswer));

    input.disabled = true;
    submitBtn.disabled = true;

    if (isCorrect) {
        input.classList.add('correct');
    } else {
        input.classList.add('incorrect');
        // 정답 표시
        const correctEl = document.createElement('div');
        correctEl.className = 'short-answer-correct';
        correctEl.textContent = `정답: ${question.answer_text}`;
        input.parentElement.appendChild(correctEl);
    }

    // 공통 채점 처리
    handleAnswerResult(isCorrect, question);

    if (question.explanation) {
        document.getElementById('explanationText').textContent = question.explanation;
        document.getElementById('explanation').classList.add('visible');
    }

    const nextBtn = document.getElementById('nextBtn');
    nextBtn.textContent = currentIndex < currentQuestions.length - 1 ? '다음 문제' : '결과 보기';
    nextBtn.classList.add('visible');
}

// 공통 채점 처리 (Fever, 점수, 오답노트)
function handleAnswerResult(isCorrect, question) {
    showFlash(isCorrect);

    if (isCorrect) {
        score++;
        streak++;

        const prevLevel = feverLevel;
        if (streak >= 6) feverLevel = 2;
        else if (streak >= 3) feverLevel = 1;
        else feverLevel = 0;

        const multiplier = feverLevel === 2 ? 3 : feverLevel === 1 ? 2 : 1;
        totalScore += 10 * multiplier;

        showScorePopup(10 * multiplier, feverLevel);
        if (feverLevel > prevLevel) showFeverPopup(feverLevel);

        updateFeverUI();
        removeWrongNote(question.pool_id, question.key);
    } else {
        streak = 0;
        feverLevel = 0;
        updateFeverUI();

        addWrongNote(question.pool_id, question.key);
        wrongThisSession.push(question.key);
    }
}

function selectOption(selectedBtn, selectedText, correctText, question) {
    if (answered) return;
    answered = true;

    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);

    const isCorrect = selectedText === correctText;

    if (isCorrect) {
        selectedBtn.classList.add('correct');
    } else {
        selectedBtn.classList.add('incorrect');
        // Highlight correct answer
        buttons.forEach(btn => {
            if (btn.querySelector('span:last-child').textContent === correctText) {
                btn.classList.add('correct');
            }
        });
    }

    handleAnswerResult(isCorrect, question);

    // Dim unrelated options
    buttons.forEach(btn => {
        if (!btn.classList.contains('correct') && !btn.classList.contains('incorrect')) {
            btn.classList.add('dimmed');
        }
    });

    // Show explanation
    if (question.explanation) {
        document.getElementById('explanationText').textContent = question.explanation;
        document.getElementById('explanation').classList.add('visible');
    }

    // Update button text for last question
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.textContent = currentIndex < currentQuestions.length - 1 ? '다음 문제' : '결과 보기';
    nextBtn.classList.add('visible');
}

document.getElementById('nextBtn').onclick = function() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        loadQuestion();
    } else {
        showResult();
    }
};

function showResult() {
    hideAllScreens();
    const resultScreen = document.getElementById('resultScreen');
    resultScreen.style.display = 'block';
    resultScreen.classList.remove('visible');
    void resultScreen.offsetWidth;
    resultScreen.classList.add('visible');

    const total = currentQuestions.length;
    const pct = score / total;

    // Confetti for high scores
    if (pct >= 0.8) launchConfetti(pct === 1 ? 80 : 40);

    document.getElementById('scoreNum').textContent = score;
    document.getElementById('scoreTotal').textContent = `/${total}`;

    // Fever 보너스 점수 표시
    const baseScore = score * 10;
    const bonusScore = totalScore - baseScore;
    const feverScoreEl = document.getElementById('feverScore');
    if (bonusScore > 0) {
        feverScoreEl.style.display = 'block';
        feverScoreEl.innerHTML = `총점 ${totalScore}점 (기본 ${baseScore} + <span class="bonus">Fever 보너스 ${bonusScore}</span>)`;
    } else {
        feverScoreEl.style.display = 'none';
    }

    // Animate ring
    const circumference = 490;
    const offset = circumference - (pct * circumference);
    setTimeout(() => {
        document.getElementById('scoreCircle').style.strokeDashoffset = offset;
    }, 100);

    // Result message
    let msg;
    if (pct === 1) msg = '만점! 접근성 전문가시네요!';
    else if (pct >= 0.8) msg = '훌륭합니다! 접근성에 대한 깊은 이해를 보여주셨습니다.';
    else if (pct >= 0.6) msg = '좋습니다! 조금 더 학습하면 전문가가 될 수 있어요.';
    else if (pct >= 0.4) msg = '괜찮아요! XAG 가이드라인을 다시 한번 살펴보세요.';
    else msg = 'XAG 가이드라인 학습이 더 필요합니다. 다시 도전해보세요!';

    document.getElementById('resultMessage').textContent = msg;

    // Save score to Firestore (전체풀기만 랭킹에 반영)
    if (!isWrongNoteMode && currentQuizMode !== 'random') {
        saveScoreToFirestore(currentPoolId, currentQuizMode, score, total, totalScore);
    }

    // Retry button
    document.getElementById('retryBtn').onclick = () => {
        if (isWrongNoteMode) {
            startQuiz(currentPoolId, true, null);
        } else {
            showModeSelect(currentPoolId);
        }
    };

    // Wrong note review button
    const wrongBtn = document.getElementById('wrongNoteBtn');
    const wrongCount = getWrongCount(currentPoolId);
    if (wrongCount > 0) {
        wrongBtn.style.display = '';
        wrongBtn.textContent = `오답노트 풀기 (${wrongCount}문항)`;
        wrongBtn.onclick = () => {
            document.getElementById('resultScreen').style.display = 'none';
            startQuiz(currentPoolId, true);
        };
    } else {
        wrongBtn.style.display = 'none';
    }
}

// Screen flash on correct/incorrect
function showFlash(isCorrect) {
    const flash = document.createElement('div');
    flash.className = `quiz-flash ${isCorrect ? 'correct-flash' : 'incorrect-flash'}`;
    document.body.appendChild(flash);

// Confetti effect
function launchConfetti(count) {
    const colors = ['#6c9cff', '#a78bfa', '#4ade80', '#f59e0b', '#f43f5e', '#22d3ee'];
    for (let i = 0; i < count; i++) {
        setTimeout(() => {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + 'vw';
            piece.style.top = '-10px';
            piece.style.background = colors[Math.floor(Math.random() * colors.length)];
            piece.style.width = (Math.random() * 8 + 6) + 'px';
            piece.style.height = (Math.random() * 8 + 6) + 'px';
            piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(piece);
            setTimeout(() => piece.remove(), 4000);
        }, Math.random() * 1000);
    }
}

// Background particle system
(function initParticles() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const PARTICLE_COUNT = 40;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            dx: (Math.random() - 0.5) * 0.3,
            dy: (Math.random() - 0.5) * 0.3,
            alpha: Math.random() * 0.3 + 0.1
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Gradient background
        const grad = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 3, 0,
            canvas.width / 2, canvas.height / 3, canvas.width * 0.8
        );
        grad.addColorStop(0, 'rgba(108, 156, 255, 0.03)');
        grad.addColorStop(0.5, 'rgba(167, 139, 250, 0.02)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw particles
        particles.forEach(p => {
            p.x += p.dx;
            p.y += p.dy;

            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(108, 156, 255, ${p.alpha})`;
            ctx.fill();
        });

        // Draw connections
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(108, 156, 255, ${0.06 * (1 - dist / 150)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }

        requestAnimationFrame(draw);
    }
    draw();
})();
