<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAG 접근성 퀴즈</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #222633;
            --border: #2a2e3d;
            --text: #e2e4eb;
            --text-dim: #8b8fa3;
            --accent: #6c9cff;
            --accent-glow: rgba(108, 156, 255, 0.15);
            --correct: #4ade80;
            --correct-glow: rgba(74, 222, 128, 0.12);
            --incorrect: #f87171;
            --incorrect-glow: rgba(248, 113, 113, 0.12);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .app {
            width: 100%;
            max-width: 680px;
        }

        /* --- Title Screen --- */
        .title-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            text-align: center;
        }

        .title-icon {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(108, 156, 255, 0.25);
        }

        .title-icon svg {
            width: 44px;
            height: 44px;
            fill: white;
        }

        .title-screen h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .title-screen h1 span {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-screen .title-sub {
            font-size: 15px;
            color: var(--text-dim);
            font-weight: 300;
            margin-bottom: 48px;
            line-height: 1.6;
        }

        .title-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 48px;
        }

        .title-stat {
            text-align: center;
        }

        .title-stat .stat-num {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .title-stat .stat-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .title-start-btn {
            padding: 16px 64px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            color: var(--bg);
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(108, 156, 255, 0.3);
        }

        .title-start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(108, 156, 255, 0.4);
        }

        .title-version {
            margin-top: 48px;
            font-size: 11px;
            color: var(--border);
        }

        /* --- Start Screen (Pool Select) --- */
        .start-screen {
            display: none;
            text-align: center;
            padding-top: 40px;
        }

        .start-screen h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .start-screen .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 36px;
        }

        .start-screen .back-link {
            display: inline-block;
            margin-bottom: 28px;
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
        }

        .start-screen .back-link:hover {
            color: var(--accent);
        }

        .pool-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .pool-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pool-btn:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .pool-btn .count {
            color: var(--text-dim);
            font-size: 13px;
        }

        /* --- Quiz Screen --- */
        .quiz-screen { display: none; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .top-bar .pool-label {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
        }

        .top-bar .progress-text {
            font-size: 13px;
            color: var(--text-dim);
        }

        .home-btn {
            padding: 5px 14px;
            font-size: 12px;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .home-btn:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--surface);
            border-radius: 2px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 28px;
            margin-bottom: 24px;
        }

        .question-number {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.7;
            word-break: keep-all;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.6;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            word-break: keep-all;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .option-btn:disabled { cursor: default; }

        .option-label {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .option-btn.correct {
            border-color: var(--correct);
            background: var(--correct-glow);
        }

        .option-btn.correct .option-label {
            background: var(--correct);
            color: var(--bg);
        }

        .option-btn.incorrect {
            border-color: var(--incorrect);
            background: var(--incorrect-glow);
        }

        .option-btn.incorrect .option-label {
            background: var(--incorrect);
            color: var(--bg);
        }

        .option-btn.dimmed {
            opacity: 0.4;
        }

        .explanation {
            display: none;
            background: rgba(108, 156, 255, 0.08);
            border: 1px solid rgba(108, 156, 255, 0.2);
            border-radius: 10px;
            padding: 18px 22px;
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-dim);
        }

        .explanation.visible { display: block; }

        .explanation .exp-title {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            font-size: 13px;
        }

        .next-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            display: none;
        }

        .next-btn:hover { opacity: 0.85; }
        .next-btn.visible { display: block; }

        /* --- Result Screen --- */
        .result-screen {
            display: none;
            text-align: center;
            padding-top: 60px;
        }

        .result-screen h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
        }

        .score-ring {
            width: 180px;
            height: 180px;
            margin: 0 auto 32px;
            position: relative;
        }

        .score-ring svg {
            transform: rotate(-90deg);
            width: 180px;
            height: 180px;
        }

        .score-ring .bg-circle {
            fill: none;
            stroke: var(--surface);
            stroke-width: 10;
        }

        .score-ring .fg-circle {
            fill: none;
            stroke: var(--accent);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .score-label {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: 700;
        }

        .score-label small {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-dim);
        }

        .result-message {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .result-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .result-actions button {
            padding: 12px 28px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
        }

        .result-actions button:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .result-actions button.primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .result-actions button.primary:hover { opacity: 0.85; }

        .result-actions button.danger {
            background: var(--incorrect);
            color: var(--bg);
            border-color: var(--incorrect);
        }

        .result-actions button.danger:hover { opacity: 0.85; }

        /* --- Section Divider --- */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0 16px;
        }

        .section-divider span {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 500;
            white-space: nowrap;
        }

        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* --- Wrong Note Button --- */
        .pool-btn .wrong-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--incorrect-glow);
            color: var(--incorrect);
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .pool-btn.wrong-note-btn {
            border-color: rgba(248, 113, 113, 0.3);
        }

        .pool-btn.wrong-note-btn:hover {
            border-color: var(--incorrect);
            background: var(--incorrect-glow);
        }

        .clear-wrong-btn {
            padding: 6px 14px;
            font-size: 12px;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .clear-wrong-btn:hover {
            color: var(--incorrect);
            border-color: var(--incorrect);
        }

        @media (max-width: 600px) {
            body { padding: 24px 16px; }
            .title-screen h1 { font-size: 28px; }
            .title-icon { width: 72px; height: 72px; border-radius: 20px; }
            .title-icon svg { width: 36px; height: 36px; }
            .title-stats { gap: 16px; }
            .title-stat .stat-num { font-size: 22px; }
            .question-card { padding: 24px 20px; }
            .question-text { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Title Screen -->
    <div class="title-screen" id="titleScreen">
        <div class="title-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
        <h1><span>XAG</span> 접근성 퀴즈</h1>
        <p class="title-sub">Xbox Accessibility Guidelines 학습 퀴즈</p>
        <div class="title-stats" id="titleStats"></div>
        <button class="title-start-btn" onclick="showPoolSelect()">시작하기</button>
        <div class="title-version" id="titleVersion"></div>
    </div>

    <!-- Pool Select Screen -->
    <div class="start-screen" id="startScreen">
        <span class="back-link" onclick="showTitle()">&larr; 타이틀로 돌아가기</span>
        <h2>섹션 선택</h2>
        <p class="subtitle">풀고 싶은 섹션을 선택하세요</p>
        <div class="pool-select" id="poolSelect"></div>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-screen" id="quizScreen">
        <div class="top-bar">
            <span class="pool-label" id="poolLabel"></span>
            <span class="progress-text" id="progressText"></span>
            <button class="home-btn" onclick="goHome()">처음으로</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

        <div class="question-card">
            <div class="question-number" id="questionNumber"></div>
            <div class="question-text" id="questionText"></div>
        </div>

        <div class="options" id="optionsContainer"></div>

        <div class="explanation" id="explanation">
            <div class="exp-title">해설</div>
            <div id="explanationText"></div>
        </div>

        <button class="next-btn" id="nextBtn">다음 문제</button>
    </div>

    <!-- Result Screen -->
    <div class="result-screen" id="resultScreen">
        <h2>퀴즈 완료</h2>
        <div class="score-ring">
            <svg viewBox="0 0 180 180">
                <circle class="bg-circle" cx="90" cy="90" r="78" />
                <circle class="fg-circle" id="scoreCircle" cx="90" cy="90" r="78" stroke-dasharray="490" stroke-dashoffset="490" />
            </svg>
            <div class="score-label"><span id="scoreNum">0</span><small id="scoreTotal">/10</small></div>
        </div>
        <div class="result-message" id="resultMessage"></div>
        <div class="result-actions">
            <button onclick="goHome()">처음으로</button>
            <button class="primary" id="retryBtn">같은 풀 다시 풀기</button>
            <button class="danger" id="wrongNoteBtn" style="display:none">오답노트 풀기</button>
        </div>
    </div>
</div>

<script src="XAG_Quiz_RawData.js"></script>
<script>
let quizData = null;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let currentPoolId = '';
let isWrongNoteMode = false;
let wrongThisSession = [];

const LABELS = ['A', 'B', 'C', 'D'];
const WRONG_STORAGE_KEY = 'xag_wrong_notes';

function getWrongNotes() {
    try { return JSON.parse(localStorage.getItem(WRONG_STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveWrongNotes(notes) {
    localStorage.setItem(WRONG_STORAGE_KEY, JSON.stringify(notes));
}

function addWrongNote(poolId, questionKey) {
    const notes = getWrongNotes();
    if (!notes[poolId]) notes[poolId] = [];
    if (!notes[poolId].includes(questionKey)) notes[poolId].push(questionKey);
    saveWrongNotes(notes);
}

function removeWrongNote(poolId, questionKey) {
    const notes = getWrongNotes();
    if (notes[poolId]) {
        notes[poolId] = notes[poolId].filter(k => k !== questionKey);
        if (notes[poolId].length === 0) delete notes[poolId];
    }
    saveWrongNotes(notes);
}

function clearWrongNotes(poolId) {
    const notes = getWrongNotes();
    if (poolId === 'all') {
        saveWrongNotes({});
    } else {
        delete notes[poolId];
        saveWrongNotes(notes);
    }
}

function getWrongCount(poolId) {
    const notes = getWrongNotes();
    if (poolId === 'all') {
        return Object.values(notes).reduce((sum, arr) => sum + arr.length, 0);
    }
    return (notes[poolId] || []).length;
}

function getWrongQuestions(poolId) {
    const notes = getWrongNotes();
    if (poolId === 'all') {
        const allKeys = new Set(Object.values(notes).flat());
        return quizData.questions.filter(q => allKeys.has(q.key));
    }
    const keys = notes[poolId] || [];
    return quizData.questions.filter(q => keys.includes(q.key));
}

function hideAllScreens() {
    document.getElementById('titleScreen').style.display = 'none';
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('quizScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'none';
}

function showTitle() {
    hideAllScreens();
    document.getElementById('titleScreen').style.display = '';
    buildTitleStats();
}

function showPoolSelect() {
    hideAllScreens();
    document.getElementById('startScreen').style.display = 'block';
    buildStartScreen();
}

function goHome() {
    showPoolSelect();
}

function buildTitleStats() {
    const pools = {};
    quizData.questions.forEach(q => {
        if (!pools[q.pool_id]) pools[q.pool_id] = 0;
        pools[q.pool_id]++;
    });

    const statsEl = document.getElementById('titleStats');
    statsEl.innerHTML = `
        <div class="title-stat"><div class="stat-num">${quizData.questions.length}</div><div class="stat-label">전체 문항</div></div>
        <div class="title-stat"><div class="stat-num">${Object.keys(pools).length}</div><div class="stat-label">섹션</div></div>
        <div class="title-stat"><div class="stat-num">${getWrongCount('all')}</div><div class="stat-label">오답노트</div></div>
    `;

    const versionEl = document.getElementById('titleVersion');
    if (quizData.meta && quizData.meta.version) {
        versionEl.textContent = `v${quizData.meta.version}`;
    }
}

// Load quiz data from global variable (XAG_Quiz_RawData.js)
quizData = QUIZ_DATA;
buildTitleStats();

function buildStartScreen() {
    const pools = {};
    quizData.questions.forEach(q => {
        if (!pools[q.pool_id]) pools[q.pool_id] = 0;
        pools[q.pool_id]++;
    });

    const container = document.getElementById('poolSelect');
    container.innerHTML = '';

    // All questions button
    const allBtn = document.createElement('button');
    allBtn.className = 'pool-btn';
    allBtn.innerHTML = `<span>전체 문제</span><span class="count">${quizData.questions.length}문항</span>`;
    allBtn.onclick = () => startQuiz('all', false);
    container.appendChild(allBtn);

    // Per-pool buttons
    for (const [poolId, count] of Object.entries(pools)) {
        const btn = document.createElement('button');
        btn.className = 'pool-btn';
        btn.innerHTML = `<span>${poolId}</span><span class="count">${count}문항</span>`;
        btn.onclick = () => startQuiz(poolId, false);
        container.appendChild(btn);
    }

    // Wrong notes section
    const totalWrong = getWrongCount('all');
    if (totalWrong > 0) {
        const divider = document.createElement('div');
        divider.className = 'section-divider';
        divider.innerHTML = '<span>오답노트</span>';
        container.appendChild(divider);

        // All wrong button
        const allWrongBtn = document.createElement('button');
        allWrongBtn.className = 'pool-btn wrong-note-btn';
        allWrongBtn.innerHTML = `<span>전체 오답 <span class="wrong-badge">${totalWrong}문항</span></span><span class="count">다시 풀기</span>`;
        allWrongBtn.onclick = () => startQuiz('all', true);
        container.appendChild(allWrongBtn);

        // Per-pool wrong buttons
        for (const poolId of Object.keys(pools)) {
            const wrongCount = getWrongCount(poolId);
            if (wrongCount > 0) {
                const wrapDiv = document.createElement('div');
                wrapDiv.style.cssText = 'display:flex;gap:8px;align-items:stretch;';

                const btn = document.createElement('button');
                btn.className = 'pool-btn wrong-note-btn';
                btn.style.flex = '1';
                btn.innerHTML = `<span>${poolId} 오답 <span class="wrong-badge">${wrongCount}문항</span></span><span class="count">다시 풀기</span>`;
                btn.onclick = () => startQuiz(poolId, true);

                const clearBtn = document.createElement('button');
                clearBtn.className = 'clear-wrong-btn';
                clearBtn.textContent = '초기화';
                clearBtn.onclick = (e) => {
                    e.stopPropagation();
                    clearWrongNotes(poolId);
                    buildStartScreen();
                };

                wrapDiv.appendChild(btn);
                wrapDiv.appendChild(clearBtn);
                container.appendChild(wrapDiv);
            }
        }
    }
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startQuiz(poolId, wrongNoteMode) {
    currentPoolId = poolId;
    isWrongNoteMode = wrongNoteMode;
    wrongThisSession = [];

    let filtered;
    if (wrongNoteMode) {
        filtered = getWrongQuestions(poolId);
    } else {
        filtered = poolId === 'all'
            ? quizData.questions
            : quizData.questions.filter(q => q.pool_id === poolId);
    }

    if (filtered.length === 0) {
        alert('풀 문제가 없습니다.');
        return;
    }

    currentQuestions = shuffle(filtered);
    currentIndex = 0;
    score = 0;

    hideAllScreens();
    document.getElementById('quizScreen').style.display = 'block';

    const label = wrongNoteMode
        ? (poolId === 'all' ? '전체 오답노트' : `${poolId} 오답노트`)
        : (poolId === 'all' ? '전체 문제' : poolId);
    document.getElementById('poolLabel').textContent = label;

    loadQuestion();
}

function loadQuestion() {
    answered = false;
    const q = currentQuestions[currentIndex];
    const total = currentQuestions.length;

    document.getElementById('questionNumber').textContent = `Q${currentIndex + 1}`;
    document.getElementById('questionText').textContent = q.question;
    document.getElementById('progressText').textContent = `${currentIndex + 1} / ${total}`;
    document.getElementById('progressFill').style.width = `${((currentIndex) / total) * 100}%`;

    // Shuffle options while tracking correct answer
    const correctText = q.options[q.answer_index - 1];
    const shuffledOptions = shuffle(q.options);

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';

    shuffledOptions.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-label">${LABELS[i]}</span><span>${opt}</span>`;
        btn.onclick = () => selectOption(btn, opt, correctText, q);
        container.appendChild(btn);
    });

    document.getElementById('explanation').classList.remove('visible');
    document.getElementById('nextBtn').classList.remove('visible');
}

function selectOption(selectedBtn, selectedText, correctText, question) {
    if (answered) return;
    answered = true;

    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);

    const isCorrect = selectedText === correctText;

    if (isCorrect) {
        selectedBtn.classList.add('correct');
        score++;
        // Remove from wrong notes if previously wrong
        removeWrongNote(question.pool_id, question.key);
    } else {
        selectedBtn.classList.add('incorrect');
        // Highlight correct answer
        buttons.forEach(btn => {
            if (btn.querySelector('span:last-child').textContent === correctText) {
                btn.classList.add('correct');
            }
        });
        // Add to wrong notes
        addWrongNote(question.pool_id, question.key);
        wrongThisSession.push(question.key);
    }

    // Dim unrelated options
    buttons.forEach(btn => {
        if (!btn.classList.contains('correct') && !btn.classList.contains('incorrect')) {
            btn.classList.add('dimmed');
        }
    });

    // Show explanation
    if (question.explanation) {
        document.getElementById('explanationText').textContent = question.explanation;
        document.getElementById('explanation').classList.add('visible');
    }

    // Update button text for last question
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.textContent = currentIndex < currentQuestions.length - 1 ? '다음 문제' : '결과 보기';
    nextBtn.classList.add('visible');
}

document.getElementById('nextBtn').onclick = function() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        loadQuestion();
    } else {
        showResult();
    }
};

function showResult() {
    hideAllScreens();
    document.getElementById('resultScreen').style.display = 'block';

    const total = currentQuestions.length;
    const pct = score / total;

    document.getElementById('scoreNum').textContent = score;
    document.getElementById('scoreTotal').textContent = `/${total}`;

    // Animate ring
    const circumference = 490;
    const offset = circumference - (pct * circumference);
    setTimeout(() => {
        document.getElementById('scoreCircle').style.strokeDashoffset = offset;
    }, 100);

    // Result message
    let msg;
    if (pct === 1) msg = '만점! 접근성 전문가시네요!';
    else if (pct >= 0.8) msg = '훌륭합니다! 접근성에 대한 깊은 이해를 보여주셨습니다.';
    else if (pct >= 0.6) msg = '좋습니다! 조금 더 학습하면 전문가가 될 수 있어요.';
    else if (pct >= 0.4) msg = '괜찮아요! XAG 가이드라인을 다시 한번 살펴보세요.';
    else msg = 'XAG 가이드라인 학습이 더 필요합니다. 다시 도전해보세요!';

    document.getElementById('resultMessage').textContent = msg;

    // Retry button
    document.getElementById('retryBtn').onclick = () => {
        document.getElementById('resultScreen').style.display = 'none';
        startQuiz(currentPoolId, false);
    };

    // Wrong note review button
    const wrongBtn = document.getElementById('wrongNoteBtn');
    const wrongCount = getWrongCount(currentPoolId);
    if (wrongCount > 0) {
        wrongBtn.style.display = '';
        wrongBtn.textContent = `오답노트 풀기 (${wrongCount}문항)`;
        wrongBtn.onclick = () => {
            document.getElementById('resultScreen').style.display = 'none';
            startQuiz(currentPoolId, true);
        };
    } else {
        wrongBtn.style.display = 'none';
    }
}
</script>
